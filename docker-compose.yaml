services:
  backend:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: backend_image_store
    restart: unless-stopped
    working_dir: /var/www/app
    volumes:
      - .:/var/www/app
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - network_image_store
    command: sh -c "php artisan migrate --force && php-fpm"

  database:
    image: postgres:17
    container_name: database_image_store
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    networks:
      - network_image_store
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      retries: 5
      timeout: 5s

  redis:
    image: redis:8
    container_name: redis_image_store
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - network_image_store

  minio:
    image: minio/minio:latest
    container_name: minio_image_store
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - network_image_store

  nginx:
    image: nginx:latest
    container_name: nginx_image_store
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - network_image_store

networks:
  network_image_store:
    driver: bridge

volumes:
  minio_data: